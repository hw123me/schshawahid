<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <title>تسجيل الدخول - نظام إدارة الشواهد المدرسية</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1MHJi0LeO90YSWA5ZPZ0dca5Tiw1WCcAw">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex justify-content-center py-5">
        <div class="card auth-card shadow-lg" style="width: 100%; max-width: 450px;">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                    <i class="bi bi-shield-lock-fill text-success fs-1"></i>
                </div>
                <h4 class="fw-bold text-dark">نظام إدارة الشواهد المدرسية</h4>
                <p class="text-muted small">مجمع الإمام يعقوب وأبو عمرو البصري</p>
            </div>
    
   <div class="login-card">
    <h3 class="text-center mb-4 text-royal-gold">تسجيل الدخول</h3>
    
    <form id="loginForm" onsubmit="event.preventDefault(); login();">
        <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        
        <button type="submit" id="loginBtn" class="btn btn-royal-save w-100">دخول</button>
        
        <div id="errorMsg" class="text-danger mt-3 text-center small"></div>
    </form>
</div>
        </div>
    </div>



<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7DC8xWvRnkc8E_200SUw_2C_c-2lovZ7CKNiWq5kB408PLPmLlJQu9RqybuYYbvz9/exec";

    // هذا الكود يعمل بمجرد فتح الصفحة أو تحديثها (Refresh)

async function login() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        if (!email || !pass) {
            Swal.fire('تنبيه', 'أدخل بيانات الدخول', 'warning');
            return;
        }

        const originalText = btn.innerHTML;
        setLoading(btn, true);

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", useremail: email, password: pass })
            });
            const result = await response.json();

            if (result.status === "success") {
                // عند نجاح الدخول، قم بحفظ الكائن كاملاً
                localStorage.setItem('loggedUser', JSON.stringify({
                    name: result.fullname,
                    role: result.role,
                    stage: result.stage,
                    permissions: result.permissions,
                    email: email
                }));
                window.location.href = (result.role.trim() === "مدير") ? "admin.html" : result.role.trim() === "وكيل" ? "agentdashboard.html" : "userdashboard.html";
            } else {
                Swal.fire('فشل الدخول', 'البريد أو كلمة المرور غير صحيحة', 'error');
            }
        } catch (e) {
            Swal.fire('خطأ', 'تحقق من اتصال الإنترنت', 'error');
        } finally {
            setLoading(btn, false, originalText);
        }
    }
    function setLoading(btn, isLoading, originalText) {
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
        } else {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }


   
   </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
